<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Yessing 小算盤</title>
<link rel="icon" type="image/png" href="./images/calculator_icon.png">
<link rel="apple-touch-icon" href="./images/calculator_icon.png">
<style>

body{
    margin:0;
    background:#f3f4f6;
    font-family:"Microsoft JhengHei";
}

.header{
    background:#003366;
    color:white;
    padding:10px 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    font-size:24px;
    font-weight:bold;
}

.logo{
    height:50px;
    width:auto;
    display:block;
}

.page{
    max-width:800px;
    margin:auto;
    padding:15px;
    padding-bottom:90px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

input,select{
    width:100%;
    height:50px;
    font-size:22px;
    text-align:center;
    background:#ffff66;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

label{
    display:block;
    margin-bottom:5px;
    margin-top:12px;
    font-weight:bold;
}

.total{
    background:#ff3333;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:12px;
    margin-top:15px;
}

.total-value{
    font-size:42px;
    font-weight:bold;
}

.result{
    background:#fafafa;
    border-radius:8px;
    padding:12px;
    margin-top:10px;
    text-align:center;
    font-size:20px;
}

/* ===== 底部導航 ===== */
.nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:white;
    display:flex;
    border-top:1px solid #ddd;
}

.nav button{
    flex:1;
    border:none;
    background:white;
    font-size:14px;
}

/* ===== 隱藏頁 ===== */
.hidden{
    display:none;
}

.btn{
    width:100%;
    height:50px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#666;
    color:white;
    font-size:18px;
}

.help-btn{
    display:inline-block;
    width:22px;
    height:22px;
    line-height:22px;
    text-align:center;
    background:#007bff;
    color:white;
    border-radius:50%;
    cursor:pointer;
    font-size:14px;
    margin-left:5px;
}

.note{
    background:#fff3cd;
    color:red;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}

.modal{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
}

.modal-content{
    background:white;
    margin:5% auto;
    padding:15px;
    width:90%;
    max-width:600px;
    border-radius:12px;
    text-align:center;
}

.modal-content img{
    width:100%;
    max-width:550px;
}

.close{
    float:right;
    font-size:30px;
    cursor:pointer;
    font-weight:bold;
}

.error-msg{
    color:red;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    margin-top:10px;
}

@media (max-width:768px){
    input,select{
        font-size:20px;
        height:55px;
    }
    .total-value{
        font-size:34px;
    }
}

/* ===== 右上角 toggle ===== */
.switch {
    position: absolute;
    right: 15px;
    top: 12px;
    width: 50px;
    height: 26px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    transition: .3s;
    border-radius: 34px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}

.switch input:checked + .slider {
    background-color: #4CAF50;
}

.switch input:checked + .slider:before {
    transform: translateX(24px);
}

/* ===== 深色模式 ===== */
body.dark {
    background:#1e1e1e;
    color:white;
}

body.dark .card{
    background:#2a2a2a;
    color:white;
}

body.dark input,
body.dark select{
    background:#333;
    color:white;
    border:1px solid #555;
}

body.dark .result{
    background:#333;
}

body.dark .nav{
    background:#2a2a2a;
}

body.dark .nav button{
    background:#2a2a2a;
    color:white;
}

body.dark .header{
    background:#111;
}

/* ===== switch base ===== */
.switch {
    position: absolute;
    right: 15px;
    top: 10px;
    width: 60px;
    height: 28px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    border-radius: 34px;
    transition: .3s;
}

/* 圓點 */
.slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    border-radius: 50%;
    transition: .3s;
    z-index: 2;
}

/* icon */
.icon {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    transition: .3s;
    z-index: 1;
}

.sun {
    left: 6px;
    opacity: 1;
}

.moon {
    right: 6px;
    opacity: 0.3;
}

/* checked 狀態 */
.switch input:checked + .slider {
    background-color: #4CAF50;
}

.switch input:checked + .slider:before {
    transform: translateX(32px);
}

/* icon 切換效果 */
.switch input:checked + .slider .sun {
    opacity: 0.3;
}

.switch input:checked + .slider .moon {
    opacity: 1;
}

/* ===== dark mode（保留你原本）===== */
body.dark {
    background:#1e1e1e;
    color:white;
}

body.dark .card{
    background:#2a2a2a;
    color:white;
}

body.dark input,
body.dark select{
    background:#333;
    color:white;
    border:1px solid #555;
}

body.dark .result{
    background:#333;
}

body.dark .nav{
    background:#2a2a2a;
}

body.dark .nav button{
    background:#2a2a2a;
    color:white;
}

body.dark .header{
    background:#111;
}


/* ===== 左側 Sidebar ===== */
.menu-btn{
    position:absolute;
    left:15px;
    top:13px;
    background:none;
    border:none;
    color:white;
    font-size:32px;
    cursor:pointer;
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:white;
    z-index:10001;
    box-shadow:2px 0 10px rgba(0,0,0,.25);
    transition:.3s;
}

.sidebar.open{
    left:0;
}

.sidebar-header{
    background:#003366;
    color:white;
    padding:18px;
    font-size:22px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.sidebar-close{
    cursor:pointer;
    font-size:30px;
}

.sidebar-item{
    width:100%;
    padding:18px;
    border:none;
    background:white;
    text-align:left;
    font-size:20px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.sidebar-item:hover{
    background:#f3f4f6;
}

.sidebar-mask{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
    z-index:10000;
}

.sidebar-mask.show{
    display:block;
}

.formula-line{
    font-size:20px;
    text-align:center;
    line-height:1.8;
    margin-bottom:15px;
}

.formula-row{
    display:grid;
    grid-template-columns:1fr 40px 1fr;
    gap:10px;
    align-items:center;
}

.formula-equal{
    font-size:28px;
    font-weight:bold;
    text-align:center;
}

body.dark .sidebar{
    background:#2a2a2a;
    color:white;
}

body.dark .sidebar-header{
    background:#111;
}

body.dark .sidebar-item{
    background:#2a2a2a;
    color:white;
    border-bottom:1px solid #444;
}

body.dark .sidebar-item:hover{
    background:#333;
}

</style>
</head>

<body>

<!-- sidebar -->
<div id="sidebarMask" class="sidebar-mask" onclick="closeSidebar()"></div>
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        功能選單
        <span class="sidebar-close" onclick="closeSidebar()">×</span>
    </div>
    <button class="sidebar-item" onclick="goSidebarPage(5)">電電</button>
</div>


<!-- header -->
<div class="header">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <img src="./images/logo.jpg" class="logo">
    Yessing 小算盤
   <label class="switch">
    <input type="checkbox" id="themeToggle">
    <span class="slider">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
    </span>
</label>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page">
<div class="card">
<h2>刺皮剩餘長度</h2>

<label>外徑(mm)<span class="help-btn" onclick="showImage('outer_diameter')">?</span></label>
<input id="outerDia" type="text" inputmode="decimal" pattern="[0-9]*">

<label>內徑(mm)<span class="help-btn" onclick="showImage('inner_diameter')">?</span></label>
<input id="innerDia" type="text" inputmode="decimal" pattern="[0-9]*">

<label>剩皮總厚(mm)<span class="help-btn" onclick="showImage('total_thickness')">?</span></label>
<input id="totalThickness" type="text" inputmode="decimal" pattern="[0-9]*">

<label>次皮厚(mm)<span class="help-btn" onclick="showImage('layer_thickness')">?</span></label>
<input id="layerThickness" type="text" inputmode="decimal" pattern="[0-9]*">

<div class="total">
<div>總長度</div>
<div id="remainResult" class="total-value">0 mm</div>
</div>

<button class="btn" onclick="clearRemain()">清除資料</button>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
<div class="card">
<h2>輪子所需刺皮長度</h2>

<label>輪面長度(mm)<span class="help-btn" onclick="showImage('surface_length')">?</span></label>
<input id="faceLength" type="text" inputmode="decimal" pattern="[0-9]*">
    
<label>刺皮寬度(mm)<span class="help-btn" onclick="showImage('skin_width')">?</span></label>
<input id="skinWidth" type="text" inputmode="decimal" pattern="[0-9]*">

<label>輪子直徑(mm)<span class="help-btn" onclick="showImage('surface_length')">?</span></label>
<input id="skinDiameter" type="text" inputmode="decimal" pattern="[0-9]*">

<div class="total">
<div>刺皮總長度</div>
<div id="skinResult" class="total-value">0 mm</div>
</div>

<button class="btn" onclick="clearSkin()">清除資料</button>
</div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page hidden">
<div class="card">
<h2>鐵氟龍長度計算</h2>

<label>輪子直徑(mm)<span class="help-btn" onclick="showImage('surface_length')">?</span></label>
<input id="teflonDiameter" type="text" inputmode="decimal" pattern="[0-9]*">

<label>鐵氟龍寬度(mm)</label>
<input id="teflonWidth" type="text" inputmode="decimal" pattern="[0-9]*">

<label>輪面長度(mm)<span class="help-btn" onclick="showImage('surface_length')">?</span></label>
<input id="teflonFace" type="text" inputmode="decimal" pattern="[0-9]*">

<label>支數</label>
<input id="qty" type="text" inputmode="decimal" pattern="[0-9]*">

<div class="total">
<div>鐵氟龍總長度</div>
<div id="teflonResult" class="total-value">0 mm</div>
</div>

<button class="btn" onclick="clearTeflon()">清除資料</button>
</div>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page hidden">
<div class="card">
<h2>電熱管電流計算</h2>

<div class="note">注意是機台電壓，不是電熱管電壓</div>

<label>瓦特數(W)</label>
<input id="heaterWatt" type="text" inputmode="decimal" pattern="[0-9]*">

<label>支數</label>
<input id="heaterQty" type="text" inputmode="decimal" pattern="[0-9]*">

<label>機台電壓(V)</label>
<input id="machineVoltage" type="text" inputmode="decimal" pattern="[0-9]*">

<label>相數</label>
<select id="phaseType">
<option value="3">三相</option>
<option value="1">單相</option>
</select>

<div class="total">
<div>安培數</div>
<div id="heaterAmpResult" class="total-value">0.00 A</div>
</div>

<div class="result">
總瓦數：<span id="heaterTotalWatt">0</span> W
</div>

<div id="heaterError" class="error-msg"></div>

<button class="btn" onclick="clearHeater()">清除資料</button>
</div>
</div>


<!-- PAGE 5 -->
<div id="page5" class="page hidden">
<div class="card">
<h2>電電</h2>

<div class="formula-line">電壓(V) × 安培(A) = 瓦特(W)</div>
<div class="formula-row">
    <div>
        <label>電壓(V)</label>
        <input id="pikachuV1" type="text" inputmode="decimal" pattern="[0-9]*">
    </div>
    <div class="formula-equal">×</div>
    <div>
        <label>安培(A)</label>
        <input id="pikachuA1" type="text" inputmode="decimal" pattern="[0-9]*">
    </div>
</div>
<div class="total">
<div>瓦特 (W)</div>
<div id="pikachuWResult" class="total-value">0 W</div>
</div>

<hr>

<div class="formula-line">瓦特(W) ÷ 電壓(V) ÷ √3 = 安培(A)</div>
<div class="formula-row">
    <div>
        <label>瓦特(W)</label>
        <input id="pikachuW2" type="text" inputmode="decimal" pattern="[0-9]*">
    </div>
    <div class="formula-equal">÷</div>
    <div>
        <label>電壓(V)</label>
        <input id="pikachuV2" type="text" inputmode="decimal" pattern="[0-9]*">
    </div>
</div>
<div class="total">
<div>安培 (A)</div>
<div id="pikachuAResult" class="total-value">0 A</div>
</div>

<hr>

<div class="formula-line">瓦特(W) ÷ 安培(A) = 電壓(V)</div>
<div class="formula-row">
    <div>
        <label>瓦特(W)</label>
        <input id="pikachuW3" type="text" inputmode="decimal" pattern="[0-9]*">
    </div>
    <div class="formula-equal">÷</div>
    <div>
        <label>安培(A)</label>
        <input id="pikachuA3" type="text" inputmode="decimal" pattern="[0-9]*">
    </div>
</div>
<div class="total">
<div>電壓 (V)</div>
<div id="pikachuVResult" class="total-value">0 V</div>
</div>

<button class="btn" onclick="clearPikachu()">清除資料</button>
</div>
</div>

<!-- bottom nav -->
<div class="nav">
<button onclick="showPage(1)">🧵<br>剩餘</button>
<button onclick="showPage(2)">📏<br>刺皮</button>
<button onclick="showPage(3)">🟫<br>鐵氟龍</button>
<button onclick="showPage(4)">⚡<br>電熱</button>
</div>

<!-- image modal（完整保留） -->
<div id="imgModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeImage()">×</span>
<img id="helpImage">
</div>
</div>

<script>

function openSidebar(){
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebarMask").classList.add("show");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarMask").classList.remove("show");
}

function goSidebarPage(p){
    showPage(p);
    closeSidebar();
}

function calcPikachu(){
    let v1 = getValue("pikachuV1");
    let a1 = getValue("pikachuA1");
    let w2 = getValue("pikachuW2");
    let v2 = getValue("pikachuV2");
    let w3 = getValue("pikachuW3");
    let a3 = getValue("pikachuA3");

    let watt = v1 * a1;
    let amp = v2 > 0 ? w2 / v2 / 1.732 : 0;
    let volt = a3 > 0 ? w3 / a3 : 0;

    document.getElementById("pikachuWResult").innerText = watt.toFixed(2) + " W";
    document.getElementById("pikachuAResult").innerText = amp.toFixed(2) + " A";
    document.getElementById("pikachuVResult").innerText = volt.toFixed(2) + " V";
}

function clearPikachu(){
    pikachuV1.value = pikachuA1.value = pikachuW2.value = pikachuV2.value = pikachuW3.value = pikachuA3.value = "";
    calcPikachu();
}

function showPage(p){
    document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));
    document.getElementById('page'+p).classList.remove('hidden');
}

function getValue(id){
    return parseFloat(document.getElementById(id).value) || 0;
}

/* ===== calculations ===== */
function calcRemain(){
    let od=getValue("outerDia");
    let id=getValue("innerDia");
    let t=getValue("totalThickness");
    let l=getValue("layerThickness");

    let avg=((od*Math.PI)+(id*Math.PI))/2;
    let turns=l>0?t/l:0;
    document.getElementById("remainResult").innerText=(avg*turns).toFixed(2)+" mm";
}

function calcSkin(){
    let f=getValue("faceLength");
    let w=getValue("skinWidth");
    let d=getValue("skinDiameter");

    let turns=w>0?f/w:0;
    document.getElementById("skinResult").innerText=(turns*d*Math.PI).toFixed(2)+" mm";
}

function calcTeflon(){
    let dia = getValue("teflonDiameter");
    let width = getValue("teflonWidth");
    let face = getValue("teflonFace");
    let qtys = getValue("qty");

    let len = 0;

    if(dia > 0 && width > 0 && face > 0 && qtys > 0){

        let circumference = dia * Math.PI;
        let sheets = Math.ceil(circumference / width);

        len = face * sheets * qtys;
    }

    document.getElementById("teflonResult").innerText =
        len.toFixed(0) + " mm";
}

function calcHeater(){
    let watt = getValue("heaterWatt");
    let qty = getValue("heaterQty");
    let voltage = getValue("machineVoltage");
    let phase = document.getElementById("phaseType").value;

    let totalWatt = watt * qty;
    let amp = 0;

    // 清除錯誤
    document.getElementById("heaterError").innerHTML = "";

    // ✅ 三相檢查
    if(phase === "3"){
        if(qty % 3 !== 0 && qty > 0){
            document.getElementById("heaterError").innerHTML = "支數錯誤";
        }
    }

    if(voltage > 0){
        if(phase === "3"){
            amp = totalWatt / voltage / 1.732;
        }else{
            amp = totalWatt / voltage;
        }
    }

    document.getElementById("heaterTotalWatt").innerText = totalWatt;
    document.getElementById("heaterAmpResult").innerText = amp.toFixed(2) + " A";
}

/* ===== clear ===== */
function clearRemain(){
    outerDia.value=innerDia.value=totalThickness.value=layerThickness.value="";
    calcRemain();
}

function clearSkin(){
    faceLength.value=skinWidth.value=skinDiameter.value="";
    calcSkin();
}

function clearTeflon(){
    teflonDiameter.value=teflonWidth.value=teflonFace.value=qty.value="";
    calcTeflon();
}

function clearHeater(){
    heaterWatt.value=heaterQty.value="";
    machineVoltage.value=380;
    phaseType.value=3;
    calcHeater();
}

/* ===== image modal ===== */
function showImage(name){
    document.getElementById("helpImage").src="./images/"+name+".jpg";
    document.getElementById("imgModal").style.display="block";
}

function closeImage(){
    document.getElementById("imgModal").style.display="none";
}

document.getElementById("imgModal").onclick=function(e){
    if(e.target.id==="imgModal") closeImage();
};

/* auto calc */
document.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("input",()=>{calcRemain();calcSkin();calcTeflon();calcHeater();calcPikachu();});
    el.addEventListener("change",()=>{calcRemain();calcSkin();calcTeflon();calcHeater();calcPikachu();});
});

const toggle = document.getElementById("themeToggle");

// 讀取記憶
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
    toggle.checked = true;
}

// 切換
toggle.addEventListener("change", function(){
    if(this.checked){
        document.body.classList.add("dark");
        localStorage.setItem("theme","dark");
    }else{
        document.body.classList.remove("dark");
        localStorage.setItem("theme","light");
    }
});
    
</script>

</body>
</html>
