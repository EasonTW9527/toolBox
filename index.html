<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YESSING 工程計算</title>

<style>

/* ===== Base ===== */
body{
    margin:0;
    background:#f3f4f6;
    font-family:"Microsoft JhengHei";
    overflow-x:hidden;
}

/* ===== Overlay ===== */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    opacity:0;
    visibility:hidden;
    transition:0.25s;
    z-index:900;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

/* ===== Sidebar ===== */
.sidebar{
    position:fixed;
    left:-220px;
    top:0;
    width:220px;
    height:100vh;
    background:#003366;
    transition:0.3s ease;
    z-index:1000;
    padding-top:20px;
}

.sidebar.active{
    left:0;
}

.sidebar button{
    width:100%;
    height:60px;
    border:none;
    background:#003366;
    color:white;
    font-size:18px;
    text-align:left;
    padding-left:15px;
}

.sidebar button:hover{
    background:#004c99;
}

/* ===== Header ===== */
.header{
    background:#003366;
    color:white;
    padding:10px 15px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.menu-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:white;
    font-size:30px;
    cursor:pointer;
}

.logo{
    height:40px;
    margin-right:10px;
}

/* ===== Layout ===== */
.main{
    margin-left:0;
    transition:.3s;
}

.main.shift{
    margin-left:220px;
}

.header.shift{
    margin-left:220px;
    transition:.3s;
}

/* ===== Pages ===== */
.page{
    max-width:900px;
    margin:auto;
    padding:15px;
}

.hidden{
    display:none;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* ===== Inputs ===== */
input, select{
    width:100%;
    height:45px;
    font-size:18px;
    text-align:center;
    margin-top:5px;
}

/* ===== Result ===== */
.total{
    margin-top:10px;
    padding:15px;
    background:#ff3333;
    color:white;
    text-align:center;
    border-radius:10px;
    font-size:24px;
}

</style>
</head>

<body>

<!-- Overlay -->
<div id="overlay" class="overlay"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <button onclick="showPage(1); closeSidebarAuto()">🧵 剩餘長度</button>
    <button onclick="showPage(2); closeSidebarAuto()">📏 刺皮長度</button>
    <button onclick="showPage(3); closeSidebarAuto()">⚙️ 鐵氟龍</button>
    <button onclick="showPage(4); closeSidebarAuto()">⚡ 電熱管</button>
</div>

<!-- Header -->
<div class="header">
    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
    <img src="./images/logo.jpg" class="logo">
    <div>YESSING 工程計算</div>
</div>

<!-- Main -->
<div class="main">

<!-- Page 1 -->
<div id="page1" class="page">
<div class="card">
<h3>刺皮剩餘長度</h3>

<input id="outerDia" placeholder="外徑(mm)">
<input id="innerDia" placeholder="內徑(mm)">
<input id="totalThickness" placeholder="剩皮總厚(mm)">
<input id="layerThickness" placeholder="次皮厚(mm)">

<div class="total" id="remainResult">0 mm</div>
</div>
</div>

<!-- Page 2 -->
<div id="page2" class="page hidden">
<div class="card">
<h3>刺皮長度</h3>

<input id="faceLength" placeholder="輪面長度">
<input id="skinWidth" placeholder="刺皮寬度">
<input id="skinDiameter" placeholder="輪子直徑">

<div class="total" id="skinResult">0 mm</div>
</div>
</div>

<!-- Page 3 -->
<div id="page3" class="page hidden">
<div class="card">
<h3>鐵氟龍</h3>

<input id="teflonDiameter" placeholder="直徑">
<input id="teflonWidth" placeholder="寬度">
<input id="teflonFace" placeholder="輪面長度">
<input id="qty" placeholder="支數">

<div class="total" id="teflonResult">0 mm</div>
</div>
</div>

<!-- Page 4 -->
<div id="page4" class="page hidden">
<div class="card">
<h3>電熱管</h3>

<input id="heaterWatt" placeholder="瓦特">
<input id="heaterQty" placeholder="支數">
<input id="machineVoltage" value="380" placeholder="電壓">

<select id="phaseType">
<option value="3">三相</option>
<option value="1">單相</option>
</select>

<div class="total" id="heaterAmpResult">0 A</div>
</div>
</div>

</div>

<script>

/* ===== Sidebar ===== */
let sidebarOpen = false;

function toggleSidebar(){
    sidebarOpen = !sidebarOpen;

    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
    document.querySelector(".main").classList.toggle("shift");
    document.querySelector(".header").classList.toggle("shift");

    document.getElementById("menuBtn").innerHTML = sidebarOpen ? "✕" : "☰";
}

function closeSidebar(){
    sidebarOpen = false;

    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
    document.querySelector(".main").classList.remove("shift");
    document.querySelector(".header").classList.remove("shift");

    document.getElementById("menuBtn").innerHTML = "☰";
}

document.getElementById("overlay").addEventListener("click", closeSidebar);

function closeSidebarAuto(){
    closeSidebar();
}

/* ===== Pages ===== */
function showPage(page){
    document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
    document.getElementById('page'+page).classList.remove('hidden');
}

/* ===== Helpers ===== */
function getValue(id){
    return parseFloat(document.getElementById(id).value) || 0;
}

/* ===== Calculations ===== */
function calcAll(){

    let od = getValue("outerDia");
    let id = getValue("innerDia");
    let total = getValue("totalThickness");
    let layer = getValue("layerThickness");
    let len1 = ((od+id)/2)*Math.PI*(layer>0?total/layer:0);
    document.getElementById("remainResult").innerText = len1.toFixed(2)+" mm";

    let face = getValue("faceLength");
    let width = getValue("skinWidth");
    let dia = getValue("skinDiameter");
    let len2 = (width>0?face/width:0)*(dia*Math.PI);
    document.getElementById("skinResult").innerText = len2.toFixed(2)+" mm";

    let td = getValue("teflonDiameter");
    let tw = getValue("teflonWidth");
    let tf = getValue("teflonFace");
    let q = getValue("qty");
    let len3 = tf*Math.ceil((td*Math.PI)/(tw||1))*q;
    document.getElementById("teflonResult").innerText = len3.toFixed(0)+" mm";

    let watt = getValue("heaterWatt");
    let qty = getValue("heaterQty");
    let v = getValue("machineVoltage");
    let phase = document.getElementById("phaseType").value;
    let totalW = watt*qty;
    let amp = phase==="3"?totalW/v/1.732:totalW/v;
    document.getElementById("heaterAmpResult").innerText = amp.toFixed(2)+" A";
}

/* ===== Auto calc ===== */
document.querySelectorAll("input,select").forEach(i=>{
    i.addEventListener("input",calcAll);
});

</script>

</body>
</html>
